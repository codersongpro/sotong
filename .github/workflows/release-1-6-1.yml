name: Release 1.6.1

on:
  push:
    paths:
      - .github/workflows/release-1-6-1.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bump version
        shell: pwsh
        run: |
          $text = Get-Content main.py -Raw -Encoding UTF8
          if ($text -notmatch "APP_VERSION = '1\.6'") { throw "Expected APP_VERSION 1.6 was not found" }
          $text = $text.Replace("APP_VERSION = '1.6'", "APP_VERSION = '1.6.1'")
          Set-Content main.py -Value $text -Encoding UTF8

      - name: Verify syntax
        run: python -m py_compile main.py

      - name: Commit and tag release
        shell: pwsh
        run: |
          Remove-Item .github/workflows/release-1-6-1.yml
          git config user.name "codex-release-bot"
          git config user.email "codex-release-bot@users.noreply.github.com"
          git add main.py .github/workflows/release-1-6-1.yml
          git commit -m "Release 1.6.1"
          git push
          git tag v1.6.1
          git push origin v1.6.1

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pywin32 olefile

      - name: Build EXE
        shell: pwsh
        run: |
          python -m PyInstaller --onefile --windowed --name "sotongpick" --hidden-import pyperclip --hidden-import openpyxl --hidden-import PIL main.py
          if (!(Test-Path "dist/sotongpick.exe")) { throw "dist/sotongpick.exe was not created" }

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          @'
          ## 변경 사항
          - 앱 버전을 1.6.1로 업데이트했습니다.
          - 새 버전이 릴리즈되었을 때 이전 버전 사용자에게 업데이트 안내창을 표시하는 기능을 추가했습니다.
          - 안내창에서 동의하면 GitHub 최신 릴리즈 다운로드 페이지를 엽니다.
          - 인터넷 연결 또는 GitHub 조회 실패 시 기존 사용 흐름을 방해하지 않고 조용히 넘어갑니다.

          ## 다운로드 안내
          아래 Assets에서 `sotongpick.exe`를 내려받아 실행하면 됩니다.

          ## 검증
          - `python -m py_compile main.py`
          - GitHub Actions Windows runner에서 PyInstaller EXE 빌드 성공
          '@ | Set-Content notes.md -Encoding UTF8
          gh release create v1.6.1 dist/sotongpick.exe --repo codersongpro/sotong --title "sotongpick 1.6.1" --notes-file notes.md
