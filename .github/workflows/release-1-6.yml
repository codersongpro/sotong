name: Release 1.6

on:
  push:
    paths:
      - .github/workflows/release-1-6.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Patch version and manual confirmation status
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('main.py')
          text = path.read_text(encoding='utf-8')

          replacements = {
              "APP_VERSION = '1.5'": "APP_VERSION = '1.6'",
              "self.root.after(0, self._show_continue)": "self.root.after(0, lambda n=name: self._show_continue(n))",
              "    def _show_continue(self):\n        name = self.names_list[0].get('name', '') if self.names_list else ''": "    def _show_continue(self, name: str):\n        name = name or ''",
          }

          missing = []
          for old, new in replacements.items():
              if old not in text:
                  missing.append(old)
              else:
                  text = text.replace(old, new, 1)

          if missing:
              raise SystemExit('Missing expected text:\n' + '\n---\n'.join(missing))

          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify syntax
        run: python -m py_compile main.py

      - name: Commit release changes
        run: |
          rm .github/workflows/release-1-6.yml
          git config user.name "codex-release-bot"
          git config user.email "codex-release-bot@users.noreply.github.com"
          git add main.py .github/workflows/release-1-6.yml
          git commit -m "Release 1.6"
          git push

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag v1.6
          git push origin v1.6
          gh release create v1.6 \
            --title "sotongpick 1.6" \
            --notes "## Changes\n- Bump app version to 1.6.\n- Fix manual confirmation status to show the currently processed name instead of the first name.\n\n## Verification\n- python -m py_compile main.py"
