name: Update 1.6 Release Notes

on:
  push:
    paths:
      - .github/workflows/update-1-6-release-notes.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Update release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md <<'EOF'
          ## 변경 사항
          - 앱 버전을 1.6으로 업데이트했습니다.
          - 수동 확인 모드에서 현재 처리 중인 이름이 정확히 표시되도록 수정했습니다.
          - Windows 실행 파일(`sotongpick.exe`)을 함께 배포합니다.

          ## 다운로드 안내
          아래 Assets에서 `sotongpick.exe`를 내려받아 실행하면 됩니다.

          ## 검증
          - `python -m py_compile main.py`
          - GitHub Actions Windows runner에서 PyInstaller EXE 빌드 성공
          EOF
          sed -i 's/^          //' notes.md
          gh release edit v1.6 --repo codersongpro/sotong --notes-file notes.md
