name: Add Update Check Feature

on:
  push:
    paths:
      - .github/workflows/add-update-check.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add update check feature
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('main.py')
          text = path.read_text(encoding='utf-8')

          old_import = "import difflib\nimport webbrowser\n"
          new_import = "import difflib\nimport webbrowser\nimport urllib.request\n"
          if old_import not in text:
              raise SystemExit('import anchor not found')
          text = text.replace(old_import, new_import, 1)

          old_config = "CONFIG_FILE = os.path.join(os.path.expanduser(\"~\"), \".chungbuk_auto_config.json\")\n"
          new_config = old_config + "LATEST_RELEASE_API = 'https://api.github.com/repos/codersongpro/sotong/releases/latest'\n"
          if old_config not in text:
              raise SystemExit('config anchor not found')
          text = text.replace(old_config, new_config, 1)

          helper_anchor = "\n\n# ─────────────────────────────────────────────\n#  App\n# ─────────────────────────────────────────────\n\nclass App:\n"
          helper_code = """

def _version_parts(version: str) -> tuple:
    version = (version or '').strip().lstrip('vV')
    parts = []
    for part in version.split('.'):
        digits = ''.join(ch for ch in part if ch.isdigit())
        parts.append(int(digits) if digits else 0)
    return tuple(parts or [0])


def _is_newer_version(latest: str, current: str) -> bool:
    latest_parts = _version_parts(latest)
    current_parts = _version_parts(current)
    size = max(len(latest_parts), len(current_parts))
    latest_parts += (0,) * (size - len(latest_parts))
    current_parts += (0,) * (size - len(current_parts))
    return latest_parts > current_parts
"""
          if helper_anchor not in text:
              raise SystemExit('App anchor not found')
          text = text.replace(helper_anchor, helper_code + helper_anchor, 1)

          init_old = "        self._refresh_calib_labels()\n        self._check_deps()\n"
          init_new = "        self._refresh_calib_labels()\n        self._check_deps()\n        self._check_for_update_async()\n"
          if init_old not in text:
              raise SystemExit('init anchor not found')
          text = text.replace(init_old, init_new, 1)

          method_anchor = "\n    # ── 의존성 확인 ────────────────────────────\n    def _check_deps(self):\n"
          methods = """
    # ── 업데이트 확인 ────────────────────────────
    def _check_for_update_async(self):
        threading.Thread(target=self._check_for_update_worker, daemon=True).start()

    def _check_for_update_worker(self):
        try:
            req = urllib.request.Request(
                LATEST_RELEASE_API,
                headers={'User-Agent': f'{APP_NAME}/{APP_VERSION}'}
            )
            with urllib.request.urlopen(req, timeout=5) as resp:
                data = json.loads(resp.read().decode('utf-8'))
            latest = (data.get('tag_name') or data.get('name') or '').strip().lstrip('vV')
            url = data.get('html_url') or 'https://github.com/codersongpro/sotong/releases/latest'
            if latest and _is_newer_version(latest, APP_VERSION):
                self.root.after(0, lambda: self._show_update_notice(latest, url))
        except Exception:
            pass

    def _show_update_notice(self, latest: str, url: str):
        open_page = messagebox.askyesno(
            '새 버전 알림',
            f'{APP_NAME} 새 버전이 나왔습니다.\\n\\n'
            f'현재 버전: {APP_VERSION}\\n'
            f'최신 버전: {latest}\\n\\n'
            '다운로드 페이지를 열까요?'
        )
        if open_page:
            webbrowser.open(url)

"""
          if method_anchor not in text:
              raise SystemExit('method anchor not found')
          text = text.replace(method_anchor, '\n' + methods + method_anchor, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify syntax
        run: python -m py_compile main.py

      - name: Commit update check feature
        run: |
          rm .github/workflows/add-update-check.yml
          git config user.name "codex-release-bot"
          git config user.email "codex-release-bot@users.noreply.github.com"
          git add main.py .github/workflows/add-update-check.yml
          git commit -m "Add update notification for new releases"
          git push
