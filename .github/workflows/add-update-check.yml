name: Add Update Check Feature

on:
  push:
    paths:
      - .github/workflows/add-update-check.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply patch
        run: python .github/scripts/add_update_check.py

      - name: Verify syntax
        run: python -m py_compile main.py

      - name: Commit update check feature
        run: |
          rm .github/workflows/add-update-check.yml .github/scripts/add_update_check.py
          git config user.name "codex-release-bot"
          git config user.email "codex-release-bot@users.noreply.github.com"
          git add main.py .github/workflows/add-update-check.yml .github/scripts/add_update_check.py
          git commit -m "Add update notification for new releases"
          git push
