name: Build 1.6 Windows EXE

on:
  push:
    paths:
      - .github/workflows/build-release-1-6-exe.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v1.6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pywin32 olefile

      - name: Verify syntax
        run: python -m py_compile main.py

      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --name "sotongpick" --hidden-import pyperclip --hidden-import openpyxl --hidden-import PIL main.py
          if (!(Test-Path "dist/sotongpick.exe")) { throw "dist/sotongpick.exe was not created" }

      - name: Upload EXE to v1.6 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload v1.6 dist/sotongpick.exe --repo codersongpro/sotong --clobber
